name: Pre-Deploy Workflow

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: predeploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-deploy:
    name: Pre-Deploy Sanity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose -f docker-compose.dev.yml config -q

      - name: Validate release script presence
        run: test -f scripts/release.js

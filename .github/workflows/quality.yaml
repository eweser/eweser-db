name: Quality Gates

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run format check
        run: npm run format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type-check
        run: npm run type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs:
      - lint
      - format
      - typecheck
      - unit-tests
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build example-basic
        run: |
          npm run build-example:basic

      - name: Start Docker backend services
        run: |
          npm run dev:docker

          # Wait for auth-api to be ready
          until bash -c '</dev/tcp/127.0.0.1/38101' 2>/dev/null; do
            echo "Waiting for auth-api on :38101"
            sleep 2
          done

          # Wait for sync server to be ready
          until bash -c '</dev/tcp/127.0.0.1/38181' 2>/dev/null; do
            echo "Waiting for sync-server on :38181"
            sleep 2
          done

      - name: Start example-basic preview and run Cypress
        run: |
          set -euo pipefail

          npm run run-example-preview:basic > example-basic.log 2>&1 &
          APP_PID=$!

          cleanup() {
            kill "$APP_PID" 2>/dev/null || true
            npm run dev:docker:stop
          }
          trap cleanup EXIT

          until bash -c '</dev/tcp/127.0.0.1/38110' 2>/dev/null; do
            echo "Waiting for example-basic on :38110"
            sleep 2
          done

          npm run test:e2e

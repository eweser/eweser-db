name: Quality Gates

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run format check
        run: npm run format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type-check
        run: npm run type-check
        env:
          NODE_OPTIONS: --max-old-space-size=8192

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  security:
    name: Security Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Runtime dependency audit (triage report)
        run: |
          set -euo pipefail
          npm audit --omit=dev --json > audit-report.json || true
          node -e "const fs=require('fs');const report=JSON.parse(fs.readFileSync('audit-report.json','utf8'));const v=report.metadata?.vulnerabilities??{};console.log('audit vulnerabilities:',v);if((v.critical??0)>0){console.error('Critical vulnerabilities detected');process.exit(1)}"

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs:
      - lint
      - format
      - typecheck
      - unit-tests
      - security
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build example-basic
        run: |
          npm run build:logger
          npm run build:shared
          npm run build:db
          npm run build-example:basic
          npm --workspace @eweser/auth-pages run build

      - name: Start Docker backend services
        run: |
          npm run dev:docker

          # Wait for auth-api to be ready
          until bash -c '</dev/tcp/127.0.0.1/38101' 2>/dev/null; do
            echo "Waiting for auth-api on :38101"
            sleep 2
          done

          # Wait for sync server to be ready
          until bash -c '</dev/tcp/127.0.0.1/38181' 2>/dev/null; do
            echo "Waiting for sync-server on :38181"
            sleep 2
          done

      - name: Start example-basic preview and run Cypress
        run: |
          set -euo pipefail

          npm run run-example-preview:basic > example-basic.log 2>&1 &
          APP_PID=$!

          cleanup() {
            kill "$APP_PID" 2>/dev/null || true
            npm run dev:docker:stop
          }
          trap cleanup EXIT

          until bash -c '</dev/tcp/127.0.0.1/38110' 2>/dev/null; do
            echo "Waiting for example-basic on :38110"
            sleep 2
          done

          CYPRESS_BASE_URL=http://127.0.0.1:38110 npm run test:e2e

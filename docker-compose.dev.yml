# Development Docker Compose — Docker-only backend services
# Frontend apps run on the host via `npm run dev` for hot reloading
#
# Usage:
#   npm run dev:docker      # Start all backend services
#   npm run dev:docker:stop # Stop all services
#   docker compose -f docker-compose.dev.yml logs -f [service] # View logs

services:
  postgres:
    image: postgres:17-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eweser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-eweser}
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - '${POSTGRES_HOST_PORT:-5499}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-eweser}']
      interval: 5s
      timeout: 3s
      retries: 5

  sync-server:
    image: eweser/sync-server:ci
    build:
      context: .
      dockerfile: packages/sync-server/Dockerfile
    volumes:
      - sync-data:/data
    expose:
      - '8080'
    ports:
      - '${SYNC_A_HOST_PORT:-38181}:8080'
    environment:
      SYNC_PORT: 8080
      SYNC_DB_PATH: /data/sync.sqlite
      SYNC_AUTH_SECRET: ${SYNC_AUTH_SECRET:-localsyncauthsecret1234567890abcd}
      AGGREGATOR_WEBHOOK_URL: http://aggregator:8090/webhooks/hocuspocus
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev-webhook-secret}

  sync-server-2:
    image: eweser/sync-server:ci
    build:
      context: .
      dockerfile: packages/sync-server/Dockerfile
    volumes:
      - sync-data-2:/data
    expose:
      - '8080'
    ports:
      - '${SYNC_B_HOST_PORT:-38182}:8080'
    environment:
      SYNC_PORT: 8080
      SYNC_DB_PATH: /data/sync.sqlite
      SYNC_AUTH_SECRET: ${SYNC_AUTH_SECRET:-localsyncauthsecret1234567890abcd}
      AGGREGATOR_WEBHOOK_URL: http://aggregator:8090/webhooks/hocuspocus
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev-webhook-secret}

  aggregator:
    image: eweser/aggregator:ci
    build:
      context: .
      dockerfile: packages/aggregator/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      sync-server:
        condition: service_started
      sync-server-2:
        condition: service_started
    expose:
      - '8090'
    ports:
      - '${AGGREGATOR_HOST_PORT:-38190}:8090'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-eweser}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-eweser}
      PORT: 8090
      SYNC_SERVER_URL: ws://sync-server:8080
      SYNC_AUTH_SECRET: ${SYNC_AUTH_SECRET:-localsyncauthsecret1234567890abcd}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev-webhook-secret}
      EWESER_AUTH_URL: http://auth-api:3000

  auth-api:
    image: eweser/auth-api:ci
    build:
      context: .
      dockerfile: packages/auth-server-hono/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '3000'
    ports:
      - '${AUTH_API_HOST_PORT:-38101}:3000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-eweser}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-eweser}
      SERVER_SECRET: ${SERVER_SECRET:-localserversecret1234567890abcdef}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-localbetterauthsecret1234567890ab}
      BETTER_AUTH_BASE_URL: ${AUTH_PUBLIC_URL:-http://localhost:38101}
      AUTH_SERVER_DOMAIN: ${AUTH_PUBLIC_DOMAIN:-localhost:38101}
      AUTH_SERVER_URL: ${AUTH_PUBLIC_URL:-http://localhost:38101}
      AUTH_TRUSTED_ORIGINS: ${AUTH_TRUSTED_ORIGINS:-http://localhost:38101,http://localhost:38111,http://127.0.0.1:38111}
      SYNC_SERVER_URL: ${SYNC_PUBLIC_URL:-ws://localhost:38181}
      SYNC_AUTH_SECRET: ${SYNC_AUTH_SECRET:-localsyncauthsecret1234567890abcd}
      PORT: 3000

  # ─── Dev-only observability ────────────────────────────────────────────────
  # Zero-config browser log viewer — browse all container logs at http://localhost:9999
  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - '${DOZZLE_PORT:-9999}:8080'

volumes:
  pgdata:
  sync-data:
  sync-data-2:

server {
  listen ${PORT};
  server_name _;

  root /usr/share/nginx/html;

  port_in_redirect off;

  location = /health {
    return 200 'OK';
    add_header Content-Type text/plain;
  }

  location = / {
    return 302 https://$host/auth/$is_args$args;
  }

  location /auth/ {
    try_files $uri $uri/ /auth/index.html;
  }

  # Fallback for ingress layers that strip the /auth prefix before reaching this
  # container (e.g. route-based forwarding on some platforms).
  location / {
    try_files $uri $uri/ /auth$uri /auth/index.html;
  }
}

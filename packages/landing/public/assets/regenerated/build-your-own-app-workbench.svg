<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 620" role="img" aria-labelledby="title desc">
  <title id="title">Build your own app workbench illustration</title>
  <desc id="desc">A soft pastoral app-building workbench with small interface tiles, schema blocks, seedlings, hills, and wind turbines.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#e0f7f2"/>
      <stop offset=".56" stop-color="#f8fbea"/>
      <stop offset="1" stop-color="#eff1cf"/>
    </linearGradient>
    <linearGradient id="field" x1="0" x2="1" y1=".1" y2="1">
      <stop offset="0" stop-color="#d5efad"/>
      <stop offset=".42" stop-color="#a7dc87"/>
      <stop offset="1" stop-color="#e2e49a"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fffff7"/>
      <stop offset="1" stop-color="#eef6df"/>
    </linearGradient>
    <linearGradient id="code" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d9fbf4"/>
      <stop offset=".56" stop-color="#fdfcef"/>
      <stop offset="1" stop-color="#d8edba"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".18" r=".58">
      <stop offset="0" stop-color="#fffdf0" stop-opacity=".94"/>
      <stop offset=".56" stop-color="#fffdf0" stop-opacity=".24"/>
      <stop offset="1" stop-color="#fffdf0" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#456966" flood-opacity=".15"/>
    </filter>
    <filter id="texture" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence baseFrequency=".015" numOctaves="2" seed="17" type="fractalNoise"/>
      <feColorMatrix type="saturate" values=".16"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .07"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="1440" height="620" rx="34" fill="url(#sky)"/>
  <rect width="1440" height="620" rx="34" fill="url(#glow)"/>


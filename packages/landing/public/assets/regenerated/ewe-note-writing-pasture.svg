<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 620" role="img" aria-labelledby="title desc">
  <title id="title">Ewe Note writing pasture illustration</title>
  <desc id="desc">A soft pastoral landscape with an open notebook, a small sheep, hills, clouds, and wind turbines.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#dff7f1"/>
      <stop offset=".58" stop-color="#f7fbec"/>
      <stop offset="1" stop-color="#f3f4d5"/>
    </linearGradient>
    <linearGradient id="field" x1="0" x2="1" y1=".1" y2="1">
      <stop offset="0" stop-color="#ccecae"/>
      <stop offset=".48" stop-color="#9edb83"/>
      <stop offset="1" stop-color="#d7e89f"/>
    </linearGradient>
    <linearGradient id="page" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fffff6"/>
      <stop offset="1" stop-color="#edf4dd"/>
    </linearGradient>
    <radialGradient id="glow" cx=".48" cy=".17" r=".54">
      <stop offset="0" stop-color="#fffdf1" stop-opacity=".92"/>
      <stop offset=".55" stop-color="#fffdf1" stop-opacity=".22"/>
      <stop offset="1" stop-color="#fffdf1" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#466d6b" flood-opacity=".16"/>
    </filter>
    <filter id="paperTexture" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence baseFrequency=".014" numOctaves="2" seed="9" type="fractalNoise"/>
      <feColorMatrix type="saturate" values=".18"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="1440" height="620" rx="34" fill="url(#sky)"/>
  <rect width="1440" height="620" rx="34" fill="url(#glow)"/>


<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Obsidian attachment import flow</title>
  <desc id="desc">A diagram showing an Obsidian vault image flowing through attachment metadata and local cache into the Ewe Note editor.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef4ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" flood-color="#25466b" flood-opacity="0.16" stdDeviation="10"/>
    </filter>
    <marker id="arrow" markerHeight="12" markerWidth="12" orient="auto" refX="10" refY="6">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="640" height="360" rx="28" fill="#f5f7fb"/>
  <rect x="32" y="34" width="576" height="292" rx="24" fill="url(#panel)" stroke="#c7d7ee"/>
  <text x="64" y="78" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Imported attachment rendering</text>
  <text x="64" y="104" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="14">Obsidian media stays visible while the original ![[...]] source is preserved.</text>

  <g filter="url(#shadow)">
    <rect x="66" y="144" width="132" height="104" rx="16" fill="#ffffff" stroke="#b9c9df"/>
    <path d="M91 172 H173 V222 H91 Z" fill="#ecfdf5" stroke="#65a30d" stroke-width="2"/>
    <circle cx="113" cy="194" r="14" fill="#22c55e"/>
    <path d="M132 216 L151 191 L173 222 H91 L111 202 Z" fill="#15803d"/>
    <text x="132" y="273" text-anchor="middle" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Obsidian vault</text>
    <text x="132" y="293" text-anchor="middle" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="12">photo.jpg</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="254" y="144" width="132" height="104" rx="16" fill="#ffffff" stroke="#b9c9df"/>
    <rect x="282" y="170" width="76" height="12" rx="6" fill="#60a5fa"/>
    <rect x="282" y="194" width="54" height="12" rx="6" fill="#93c5fd"/>
    <rect x="282" y="218" width="88" height="12" rx="6" fill="#bfdbfe"/>
    <text x="320" y="273" text-anchor="middle" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Metadata</text>
    <text x="320" y="293" text-anchor="middle" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="12">sourcePath + cache key</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="442" y="144" width="132" height="104" rx="16" fill="#ffffff" stroke="#b9c9df"/>
    <rect x="467" y="170" width="82" height="54" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <path d="M482 208 L497 190 L512 205 L526 185 L549 224 H467 L482 208 Z" fill="#2563eb"/>
    <text x="508" y="273" text-anchor="middle" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Ewe Note editor</text>
    <text x="508" y="293" text-anchor="middle" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="12">rendered image embed</text>
  </g>

  <path d="M204 196 H244" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M392 196 H432" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M132 124 C132 104 508 104 508 124" fill="none" stroke="#94a3b8" stroke-dasharray="6 8" stroke-width="3"/>
  <text x="320" y="130" text-anchor="middle" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="13">round-trip saves the original OFM source</text>
</svg>

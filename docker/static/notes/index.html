<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ewe Note Migration In Progress</title>
    <style>
      :root {
        color-scheme: light;
        font-family: 'Segoe UI', sans-serif;
        background: #f7f1e8;
        color: #1f2937;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(
            circle at top left,
            rgba(232, 180, 95, 0.28),
            transparent 35%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(87, 132, 201, 0.2),
            transparent 32%
          ),
          #f7f1e8;
      }

      main {
        width: min(40rem, calc(100vw - 2rem));
        padding: 2rem;
        border: 1px solid rgba(31, 41, 55, 0.12);
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 24px 80px rgba(31, 41, 55, 0.12);
      }

      h1 {
        margin-top: 0;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
      }

      p {
        line-height: 1.6;
      }

      a {
        color: #0f4c81;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ewe Note Is Moving Behind Caddy</h1>
      <p>
        The reverse proxy is now handling <code>/notes</code>, but the Ewe Note
        SPA itself is still being ported to the new path-aware build in Run 2.3.
      </p>
      <p>
        Auth is available now at <a href="/auth/sign-in">/auth/sign-in</a>, and
        the basic example app is served from the site root.
      </p>
    </main>
  </body>
</html>

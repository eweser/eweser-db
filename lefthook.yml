pre-commit:
  parallel: true
  commands:
    staged-checks:
      run: npm run precommit:staged
    secrets-scan:
      run: npm run secrets:scan

pre-push:
  parallel: true
  commands:
    secrets-scan:
      run: npm run secrets:scan -- --tracked
    lint:
      run: npm run lint
    format-check:
      run: npm run format:check

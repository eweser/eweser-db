pre-commit:
  parallel: true
  commands:
    staged-checks:
      run: npm run precommit:staged
    secrets-scan:
      run: npm run secrets:scan -- --staged

pre-push:
  parallel: false
  commands:
    autofix:
      run: npm run prepush:autofix
    secrets-scan:
      run: npm run secrets:scan -- --tracked
    verify:
      run: npm run prepush:verify

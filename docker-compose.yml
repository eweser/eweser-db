services:
  postgres:
    image: postgres:17-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eweser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-eweser}
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-eweser}']
      interval: 5s
      timeout: 3s
      retries: 5

  sync-server:
    build: packages/sync-server
    volumes:
      - sync-data:/data
    ports:
      - '8080:8080'
    environment:
      SYNC_PORT: 8080
      SYNC_DB_PATH: /data/sync.sqlite
      SYNC_AUTH_SECRET: ${SYNC_AUTH_SECRET:-dev-secret}

  auth-api:
    build: packages/auth-server-hono
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-eweser}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-eweser}
      SERVER_SECRET: ${SERVER_SECRET:-dev-secret}
      PORT: 3000

volumes:
  pgdata:
  sync-data:
